{% extends "base.html" %}
{% block title %}EingEing — Videos{% endblock %}
{% block content %}
  <div class="section-label">Cover By EingEing</div>
  <div class="video-grid">
    {% for v in videos %}
    <a class="video-card" href="{{ v.url }}" target="_blank">
      <div class="video-thumb">
        <img src="{{ url_for('static', filename='images/' + v.thumb) }}"
             alt="{{ v.title }}" class="video-thumb-img"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="video-thumb-fallback" style="background:{{ v.color }}">
          <span style="font-size:2rem;opacity:.4">🎵</span>
        </div>
        <div class="play-overlay">
          <div class="play-circle">▶</div>
          <div class="play-label">เปิดใน TikTok</div>
        </div>
      </div>
      <div class="video-info">
        <div class="title">{{ v.title }}</div>
        <div class="video-meta-row">
          {% if v.venue %}<span class="video-venue">{{ v.venue }}</span>{% endif %}
          {% if v.date %}<span class="video-date">{{ v.date }}</span>{% endif %}
        </div>
      </div>
    </a>
    {% endfor %}
{% endblock %}
