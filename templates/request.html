{% extends "base.html" %}
{% block title %}EingEing — ขอเพลง{% endblock %}
{% block content %}
  <div class="request-wrap">
    <h2>ขอเพลง</h2>
    <p>อยากได้เพลงไหน? ส่งรายชื่อเพลงมาได้เลย EingEing จะพยายามเล่นให้นะคะ 🎵</p>
    <div class="form-group"><label>ชื่อของคุณ</label><input type="text" id="reqName" placeholder="เช่น น้องอิง"></div>
    <div class="form-group"><label>ชื่อเพลงที่ต้องการ</label><input type="text" id="reqSong" placeholder="เช่น Stay With Me, Perfect"></div>
    <div class="form-group"><label>ศิลปิน / เจ้าของเพลง</label><input type="text" id="reqArtist" placeholder="เช่น Ed Sheeran"></div>
    <div class="form-group"><label>ทิปที่ให้ (ไม่บังคับ)</label><input type="text" id="reqTip" placeholder="เช่น 50, 100..."></div>
    <div class="form-group"><label>ข้อความถึง EingEing (ไม่บังคับ)</label><textarea id="reqMsg" placeholder="สวัสดีค่ะ อยากให้ร้องเพลง..."></textarea></div>
    <button class="submit-btn" id="submitBtn">ส่งคำขอเพลง →</button>
    <div class="success-msg" id="successMsg"></div>
  </div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/request.js') }}"></script>
{% endblock %}
